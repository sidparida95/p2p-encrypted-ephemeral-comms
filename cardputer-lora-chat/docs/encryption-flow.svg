<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Cardputer LoRa Chat — Encryption flow</title>
  <desc>AES-256-CBC encryption pipeline: password → SHA-256 key → PKCS7-padded plaintext with magic prefix → CBC encrypt with random IV → hex encode → LoRa packet.</desc>

  <defs>
    <marker id="enArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#444"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
      .sec   { font-size: 13px; font-weight: 700; fill: #444; }
      .box   { font-size: 12px; font-weight: 600; }
      .mono  { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; }
      .note  { font-size: 11px; fill: #666; }
      .arrow { stroke: #555; stroke-width: 1.6; fill: none; }
      .arrowLbl { font-size: 11px; font-weight: 600; fill: #555; }
    </style>
  </defs>

  <text class="title" x="410" y="32" text-anchor="middle">Encrypting a message  ·  AES-256-CBC + SHA-256 key derivation</text>

  <!-- ============ SEND SIDE ============ -->
  <text class="sec" x="40" y="70">SEND</text>

  <!-- Password input -->
  <g>
    <rect x="40" y="86" width="180" height="50" rx="6" fill="#FFF7E0" stroke="#E0A800" stroke-width="1.5"/>
    <text class="box" x="130" y="106" text-anchor="middle">Password</text>
    <text class="mono" x="130" y="126" text-anchor="middle">"hunter2"</text>
  </g>

  <!-- SHA-256 -->
  <g>
    <rect x="270" y="86" width="180" height="50" rx="6" fill="#E8F4FF" stroke="#1976D2" stroke-width="1.5"/>
    <text class="box" x="360" y="106" text-anchor="middle">SHA-256</text>
    <text class="note" x="360" y="124" text-anchor="middle">key = sha256(password)</text>
  </g>

  <!-- Key bytes -->
  <g>
    <rect x="500" y="86" width="280" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text class="box" x="640" y="106" text-anchor="middle">256-bit AES key</text>
    <text class="mono" x="640" y="124" text-anchor="middle">F52FECA…CC8B  (32 bytes)</text>
  </g>

  <path class="arrow" d="M 220 111 L 270 111" marker-end="url(#enArr)"/>
  <path class="arrow" d="M 450 111 L 500 111" marker-end="url(#enArr)"/>

  <!-- ============ PLAINTEXT PREP ============ -->
  <text class="sec" x="40" y="184">PLAINTEXT</text>

  <g>
    <rect x="40" y="200" width="180" height="50" rx="6" fill="#FFF7E0" stroke="#E0A800" stroke-width="1.5"/>
    <text class="box" x="130" y="220" text-anchor="middle">Message</text>
    <text class="mono" x="130" y="240" text-anchor="middle">"meet at 9"</text>
  </g>

  <g>
    <rect x="270" y="200" width="180" height="50" rx="6" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.5"/>
    <text class="box" x="360" y="220" text-anchor="middle">Prepend magic</text>
    <text class="mono" x="360" y="240" text-anchor="middle">"LORA" + msg</text>
  </g>

  <g>
    <rect x="500" y="200" width="280" height="50" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
    <text class="box" x="640" y="220" text-anchor="middle">PKCS7 pad to 16-byte blocks</text>
    <text class="mono" x="640" y="238" text-anchor="middle">[LORAmeet at 9][PPPPPPP]</text>
  </g>

  <path class="arrow" d="M 220 225 L 270 225" marker-end="url(#enArr)"/>
  <path class="arrow" d="M 450 225 L 500 225" marker-end="url(#enArr)"/>

  <!-- ============ ENCRYPT ============ -->
  <text class="sec" x="40" y="298">ENCRYPT</text>

  <g>
    <rect x="40" y="314" width="180" height="60" rx="6" fill="#E1F5FE" stroke="#0288D1" stroke-width="1.5"/>
    <text class="box" x="130" y="334" text-anchor="middle">Random 16-byte IV</text>
    <text class="mono" x="130" y="352" text-anchor="middle">esp_random()</text>
    <text class="note" x="130" y="367" text-anchor="middle">new for every message</text>
  </g>

  <g>
    <rect x="270" y="314" width="180" height="60" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
    <text class="box" x="360" y="336" text-anchor="middle">mbedtls_aes_crypt_cbc</text>
    <text class="note" x="360" y="354" text-anchor="middle">AES-256 · CBC mode</text>
    <text class="note" x="360" y="368" text-anchor="middle">key + IV + padded plaintext</text>
  </g>

  <g>
    <rect x="500" y="314" width="280" height="60" rx="6" fill="#F1F8E9" stroke="#558B2F" stroke-width="1.5"/>
    <text class="box" x="640" y="336" text-anchor="middle">Ciphertext (binary)</text>
    <text class="mono" x="640" y="356" text-anchor="middle">5A 3E 9F 11 …  (16-byte multiple)</text>
  </g>

  <path class="arrow" d="M 220 344 L 270 344" marker-end="url(#enArr)"/>
  <path class="arrow" d="M 450 344 L 500 344" marker-end="url(#enArr)"/>

  <!-- AES key + plaintext feed in -->
  <path class="arrow" d="M 640 142 L 640 160 L 360 160 L 360 314" stroke-dasharray="3 3" marker-end="url(#enArr)"/>
  <text class="arrowLbl" x="500" y="156">key  ↓</text>
  <path class="arrow" d="M 640 256 L 640 280 L 360 280 L 360 314" stroke-dasharray="3 3" marker-end="url(#enArr)"/>
  <text class="arrowLbl" x="490" y="276">padded plaintext  ↓</text>

  <!-- ============ PACKET ============ -->
  <text class="sec" x="40" y="418">LORA PACKET</text>

  <g>
    <rect x="40" y="434" width="740" height="42" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
    <text class="mono" x="60" y="460">"ENC:"</text>
    <text class="mono" x="120" y="460" fill="#0288D1">&lt;hex IV (32 chars)&gt;</text>
    <text class="mono" x="320" y="460" fill="#558B2F">&lt;hex ciphertext (≤ 200 chars)&gt;</text>
    <text class="note" x="760" y="460" text-anchor="end">→ AT+SEND=0,…</text>
  </g>

  <path class="arrow" d="M 130 374 L 130 434" marker-end="url(#enArr)"/>
  <text class="arrowLbl" x="135" y="408">IV →</text>
  <path class="arrow" d="M 640 374 L 640 434" marker-end="url(#enArr)"/>
  <text class="arrowLbl" x="645" y="408">cipher →</text>

</svg>
