<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Cardputer LoRa Chat — System architecture</title>
  <desc>Two Cardputer + RYLR998 nodes communicating directly over LoRa radio.</desc>

  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
      .node   { font-size: 14px; font-weight: 700; }
      .sub    { font-size: 11px; fill: #666; }
      .wave   { font-size: 12px; font-weight: 600; }
      .stack  { font-size: 11px; }
    </style>
    <linearGradient id="cp1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <linearGradient id="cp2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#81D4FA"/>
    </linearGradient>
  </defs>

  <text class="title" x="400" y="34" text-anchor="middle">How it works — two Cardputers talking directly</text>

  <!-- NODE A -->
  <g transform="translate(40 110)">
    <rect width="200" height="140" rx="12" fill="url(#cp1)" stroke="#F57C00" stroke-width="2"/>
    <text class="node" x="100" y="32" text-anchor="middle" fill="#7A5C00">📟 Node A</text>
    <text class="sub"  x="100" y="50" text-anchor="middle">Cardputer · ESP32-S3</text>
    <line x1="20" y1="64" x2="180" y2="64" stroke="#F57C00" opacity="0.4"/>
    <text class="stack" x="20" y="84">App  (UI + commands)</text>
    <text class="stack" x="20" y="104">AES-256-CBC  (mbedtls)</text>
    <text class="stack" x="20" y="124">UART @ 115200</text>
  </g>

  <!-- RYLR A -->
  <g transform="translate(40 270)">
    <rect width="200" height="60" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
    <text class="node" x="100" y="26" text-anchor="middle" fill="#4A148C">📡 RYLR998</text>
    <text class="sub"  x="100" y="46" text-anchor="middle">868 MHz · LoRa modem</text>
  </g>
  <line x1="140" y1="250" x2="140" y2="270" stroke="#999" stroke-width="2" stroke-dasharray="3 2"/>

  <!-- NODE B -->
  <g transform="translate(560 110)">
    <rect width="200" height="140" rx="12" fill="url(#cp2)" stroke="#0288D1" stroke-width="2"/>
    <text class="node" x="100" y="32" text-anchor="middle" fill="#01579B">📟 Node B</text>
    <text class="sub"  x="100" y="50" text-anchor="middle">Cardputer · ESP32-S3</text>
    <line x1="20" y1="64" x2="180" y2="64" stroke="#0288D1" opacity="0.4"/>
    <text class="stack" x="20" y="84">App  (UI + commands)</text>
    <text class="stack" x="20" y="104">AES-256-CBC  (mbedtls)</text>
    <text class="stack" x="20" y="124">UART @ 115200</text>
  </g>

  <!-- RYLR B -->
  <g transform="translate(560 270)">
    <rect width="200" height="60" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
    <text class="node" x="100" y="26" text-anchor="middle" fill="#4A148C">📡 RYLR998</text>
    <text class="sub"  x="100" y="46" text-anchor="middle">868 MHz · LoRa modem</text>
  </g>
  <line x1="660" y1="250" x2="660" y2="270" stroke="#999" stroke-width="2" stroke-dasharray="3 2"/>

  <!-- RF WAVES -->
  <g transform="translate(240 270)" opacity="0.85">
    <path d="M 20 30 Q 60 0  100 30 T 180 30 T 260 30 T 320 30"
          fill="none" stroke="#7B1FA2" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 20 38 Q 60 8  100 38 T 180 38 T 260 38 T 320 38"
          fill="none" stroke="#7B1FA2" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M 20 22 Q 60 -8 100 22 T 180 22 T 260 22 T 320 22"
          fill="none" stroke="#7B1FA2" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <text class="wave" x="160" y="-2" text-anchor="middle" fill="#4A148C">LoRa point-to-point</text>
    <text class="sub"  x="160" y="62" text-anchor="middle">same freq + network ID</text>
  </g>

  <!-- bottom strip -->
  <g transform="translate(40 350)">
    <text class="sub" x="0" y="0">✓ No internet  ·  ✓ No servers  ·  ✓ No SIM cards  ·  ✓ End-to-end encrypted (in /secure mode)  ·  ✓ Range: hundreds of metres typical, several km LOS</text>
  </g>
</svg>
