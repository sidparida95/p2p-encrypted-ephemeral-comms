<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Cardputer LoRa Chat — App state machine</title>
  <desc>States: locked, chat, encrypt password prompt, decrypt password prompt.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#444"/>
    </marker>
    <style>
      .title    { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
      .stateLbl { font-size: 14px; font-weight: 700; fill: #fff; }
      .stateSub { font-size: 11px; fill: #fff; opacity: 0.85; }
      .arrow    { stroke: #444; stroke-width: 1.6; fill: none; }
      .arrowLbl { font-size: 11px; fill: #333; font-weight: 600; }
      .arrowHnt { font-size: 10px; fill: #777; }
    </style>
  </defs>

  <text class="title" x="350" y="34" text-anchor="middle">App states</text>

  <!-- LOCKED -->
  <g>
    <rect x="270" y="70" width="160" height="64" rx="10" fill="#D32F2F" stroke="#8B0000" stroke-width="1.5"/>
    <text class="stateLbl" x="350" y="98" text-anchor="middle">🔒 LOCKED</text>
    <text class="stateSub" x="350" y="118" text-anchor="middle">Password prompt</text>
  </g>

  <!-- CHAT -->
  <g>
    <rect x="270" y="200" width="160" height="64" rx="10" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
    <text class="stateLbl" x="350" y="228" text-anchor="middle">💬 CHAT</text>
    <text class="stateSub" x="350" y="248" text-anchor="middle">Type &amp; send / receive</text>
  </g>

  <!-- ENCRYPT -->
  <g>
    <rect x="60" y="330" width="200" height="64" rx="10" fill="#F57C00" stroke="#BF5300" stroke-width="1.5"/>
    <text class="stateLbl" x="160" y="358" text-anchor="middle">🔐 ENCRYPT PROMPT</text>
    <text class="stateSub" x="160" y="378" text-anchor="middle">Password to seal message</text>
  </g>

  <!-- DECRYPT -->
  <g>
    <rect x="440" y="330" width="200" height="64" rx="10" fill="#7B1FA2" stroke="#4A148C" stroke-width="1.5"/>
    <text class="stateLbl" x="540" y="358" text-anchor="middle">🔓 DECRYPT PROMPT</text>
    <text class="stateSub" x="540" y="378" text-anchor="middle">Password to open #N</text>
  </g>

  <!-- ============ TRANSITIONS ============ -->
  <!-- LOCKED -> CHAT -->
  <path class="arrow" d="M 350 134 L 350 200" marker-end="url(#arrow)"/>
  <text class="arrowLbl" x="360" y="160">correct password</text>
  <text class="arrowHnt" x="360" y="174">+ Enter</text>

  <!-- LOCKED self-loop wrong pw -->
  <path class="arrow" d="M 440 92 Q 510 70 490 110 Q 470 130 432 124" marker-end="url(#arrow)"/>
  <text class="arrowLbl" x="500" y="84">wrong</text>

  <!-- CHAT -> LOCKED via /lock -->
  <path class="arrow" d="M 270 220 L 200 220 L 200 110 L 270 110" marker-end="url(#arrow)"/>
  <text class="arrowLbl" x="120" y="166">/lock</text>

  <!-- CHAT -> ENCRYPT (when secureMode + type msg) -->
  <path class="arrow" d="M 290 264 L 200 330" marker-end="url(#arrow)"/>
  <text class="arrowLbl" x="180" y="296">message typed,</text>
  <text class="arrowLbl" x="180" y="310">/secure ON</text>

  <!-- ENCRYPT -> CHAT (send) -->
  <path class="arrow" d="M 230 332 L 320 264" marker-end="url(#arrow)"/>
  <text class="arrowLbl" x="288" y="306">pw + Enter</text>
  <text class="arrowHnt" x="288" y="320">→ TX encrypted</text>

  <!-- CHAT -> DECRYPT (when user types /d N) -->
  <path class="arrow" d="M 410 264 L 500 330" marker-end="url(#arrow)"/>
  <text class="arrowLbl" x="438" y="296">/d N</text>

  <!-- DECRYPT -> CHAT -->
  <path class="arrow" d="M 470 332 L 380 264" marker-end="url(#arrow)"/>
  <text class="arrowLbl" x="394" y="306">pw + Enter</text>
  <text class="arrowHnt" x="394" y="320">(right or wrong)</text>

  <!-- LEGEND -->
  <g transform="translate(40 420)">
    <text class="arrowHnt">Empty password + Enter at either crypto prompt = cancel and return to chat.</text>
  </g>
</svg>
