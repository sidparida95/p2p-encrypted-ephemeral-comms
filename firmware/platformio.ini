; Alternative build option: PlatformIO (https://platformio.org/)
;
; Usage:
;   pio run                      # build
;   pio run -t upload            # build + flash (auto-detects port)
;
; The merged binary will be at:
;   .pio/build/cardputer/firmware.bin
;
; That file flashes at 0x0 with M5 Burner.

[env:cardputer]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -DESP32S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
lib_deps =
    m5stack/M5Cardputer@^1.0.3
    m5stack/M5Unified@^0.2.0
    m5stack/M5GFX@^0.2.0
