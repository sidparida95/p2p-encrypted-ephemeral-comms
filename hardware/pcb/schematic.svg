<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Cardputer LoRa Chat — PCB schematic</title>
  <desc>Schematic of the regulator + RYLR998 carrier board for the Cardputer Grove port.</desc>

  <defs>
    <style>
      .title  { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
      .lbl    { font-size: 11px; font-family: 'SF Mono', Menlo, monospace; fill: #222; }
      .pin    { font-size: 10px; font-family: 'SF Mono', Menlo, monospace; fill: #444; }
      .net    { font-size: 12px; font-weight: 700; font-family: 'SF Mono', Menlo, monospace; }
      .ref    { font-size: 12px; font-weight: 700; fill: #0044AA; }
      .val    { font-size: 11px; fill: #333; }
      .wire   { stroke: #0044AA; stroke-width: 1.6; fill: none; }
      .gnd    { stroke: #555; stroke-width: 1.6; fill: none; }
      .dot    { fill: #0044AA; }
      .box    { fill: #FFFCEA; stroke: #B58A00; stroke-width: 1.5; }
      .ic     { fill: #E8F4FF; stroke: #1976D2; stroke-width: 1.5; }
      .cap    { fill: none; stroke: #222; stroke-width: 1.6; }
      .note   { font-size: 10px; fill: #666; font-style: italic; }
    </style>
  </defs>

  <text class="title" x="440" y="32" text-anchor="middle">Cardputer LoRa Chat — Carrier Board Schematic</text>

  <!-- ============ J1: GROVE CONNECTOR ============ -->
  <g>
    <rect class="box" x="50" y="100" width="120" height="170" rx="4"/>
    <text class="ref" x="110" y="92" text-anchor="middle">J1</text>
    <text class="val" x="110" y="290" text-anchor="middle">Grove HY2.0-4P</text>
    <text class="note" x="110" y="304" text-anchor="middle">(to Cardputer)</text>

    <!-- pins -->
    <line x1="170" y1="130" x2="220" y2="130" stroke="#222" stroke-width="1.6"/>
    <text class="pin" x="160" y="126" text-anchor="end">1</text>
    <text class="lbl" x="178" y="126">5V</text>

    <line x1="170" y1="170" x2="220" y2="170" stroke="#222" stroke-width="1.6"/>
    <text class="pin" x="160" y="166" text-anchor="end">2</text>
    <text class="lbl" x="178" y="166">GND</text>

    <line x1="170" y1="210" x2="220" y2="210" stroke="#222" stroke-width="1.6"/>
    <text class="pin" x="160" y="206" text-anchor="end">3</text>
    <text class="lbl" x="178" y="206">G2 (RX)</text>

    <line x1="170" y1="250" x2="220" y2="250" stroke="#222" stroke-width="1.6"/>
    <text class="pin" x="160" y="246" text-anchor="end">4</text>
    <text class="lbl" x="178" y="246">G1 (TX)</text>
  </g>

  <!-- ============ U1: AMS1117-3.3 ============ -->
  <g transform="translate(360 110)">
    <rect class="ic" width="160" height="100" rx="6"/>
    <text class="ref" x="80" y="-8" text-anchor="middle">U1</text>
    <text class="val" x="80" y="55" text-anchor="middle" font-weight="700">AMS1117-3.3</text>
    <text class="note" x="80" y="72" text-anchor="middle">SOT-223  ·  5V → 3.3V</text>

    <text class="pin" x="6" y="34">IN</text>
    <text class="pin" x="154" y="34" text-anchor="end">OUT</text>
    <text class="pin" x="80" y="98" text-anchor="middle">GND</text>

    <!-- pin stubs -->
    <line x1="0" y1="30" x2="-30" y2="30" stroke="#222" stroke-width="1.6"/>
    <line x1="160" y1="30" x2="190" y2="30" stroke="#222" stroke-width="1.6"/>
    <line x1="80" y1="100" x2="80" y2="130" stroke="#222" stroke-width="1.6"/>
  </g>

  <!-- ============ C1: input cap ============ -->
  <g transform="translate(280 160)">
    <text class="ref" x="14" y="-2">C1</text>
    <text class="val" x="14" y="42">10µF</text>
    <!-- cap symbol: two horizontal lines, leads top/bottom -->
    <line x1="0" y1="10" x2="28" y2="10" class="cap"/>
    <line x1="0" y1="22" x2="28" y2="22" class="cap"/>
    <line x1="14" y1="-10" x2="14" y2="10" stroke="#222" stroke-width="1.6"/>
    <line x1="14" y1="22" x2="14" y2="64" stroke="#222" stroke-width="1.6"/>
  </g>

  <!-- ============ C2: output cap ============ -->
  <g transform="translate(580 160)">
    <text class="ref" x="14" y="-2">C2</text>
    <text class="val" x="14" y="42">22µF</text>
    <line x1="0" y1="10" x2="28" y2="10" class="cap"/>
    <line x1="0" y1="22" x2="28" y2="22" class="cap"/>
    <line x1="14" y1="-10" x2="14" y2="10" stroke="#222" stroke-width="1.6"/>
    <line x1="14" y1="22" x2="14" y2="64" stroke="#222" stroke-width="1.6"/>
  </g>

  <!-- ============ J2: RYLR998 socket ============ -->
  <g>
    <rect class="box" x="700" y="80" width="140" height="320" rx="4"/>
    <text class="ref" x="770" y="72" text-anchor="middle">J2</text>
    <text class="val" x="770" y="418" text-anchor="middle">RYLR998 socket</text>
    <text class="note" x="770" y="432" text-anchor="middle">(1×5 female header)</text>

    <line x1="690" y1="120" x2="700" y2="120" stroke="#222" stroke-width="1.6"/>
    <text class="pin" x="688" y="116" text-anchor="end">1</text>
    <text class="lbl" x="710" y="116">GND</text>

    <line x1="690" y1="180" x2="700" y2="180" stroke="#222" stroke-width="1.6"/>
    <text class="pin" x="688" y="176" text-anchor="end">2</text>
    <text class="lbl" x="710" y="176">TX</text>

    <line x1="690" y1="240" x2="700" y2="240" stroke="#222" stroke-width="1.6"/>
    <text class="pin" x="688" y="236" text-anchor="end">3</text>
    <text class="lbl" x="710" y="236">RX</text>

    <line x1="690" y1="300" x2="700" y2="300" stroke="#222" stroke-width="1.6"/>
    <text class="pin" x="688" y="296" text-anchor="end">4</text>
    <text class="lbl" x="710" y="296">RST</text>

    <line x1="690" y1="360" x2="700" y2="360" stroke="#222" stroke-width="1.6"/>
    <text class="pin" x="688" y="356" text-anchor="end">5</text>
    <text class="lbl" x="710" y="356">VDD</text>
  </g>

  <!-- ============ WIRES ============ -->

  <!-- 5V net: J1 pin 1 -> U1 IN; also to C1+ -->
  <path class="wire" d="M 220 130 L 294 130 L 294 150"/>
  <path class="wire" d="M 294 130 L 330 130 L 330 140"/>
  <circle class="dot" cx="294" cy="130" r="3.5"/>
  <text class="net" x="240" y="124" fill="#D32F2F">+5V</text>

  <!-- 3V3 net: U1 OUT -> C2+ -> RYLR998 VDD (pin 5, y=360) -->
  <path class="wire" d="M 550 140 L 594 140 L 594 150"/>
  <path class="wire" d="M 594 140 L 660 140 L 660 360 L 690 360"/>
  <circle class="dot" cx="594" cy="140" r="3.5"/>
  <text class="net" x="610" y="132" fill="#2E7D32">+3V3</text>

  <!-- GND net: shared bus across bottom -->
  <!-- J1 pin 2 (GND) -->
  <path class="gnd" d="M 220 170 L 250 170 L 250 380"/>
  <!-- bus line -->
  <path class="gnd" d="M 100 380 L 800 380"/>
  <!-- U1 GND tap -->
  <path class="gnd" d="M 440 240 L 440 380"/>
  <!-- C1- -->
  <path class="gnd" d="M 294 224 L 294 380"/>
  <!-- C2- -->
  <path class="gnd" d="M 594 224 L 594 380"/>
  <!-- RYLR998 GND (pin 1, y=120) -->
  <path class="gnd" d="M 690 120 L 670 120 L 670 380"/>
  <!-- GND symbol on left -->
  <g transform="translate(250 380)">
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#555" stroke-width="2"/>
    <line x1="-7" y1="5" x2="7" y2="5" stroke="#555" stroke-width="2"/>
    <line x1="-3" y1="10" x2="3" y2="10" stroke="#555" stroke-width="2"/>
    <text class="net" x="0" y="28" text-anchor="middle" fill="#555">GND</text>
  </g>
  <circle class="dot" cx="294" cy="380" r="3.5"/>
  <circle class="dot" cx="440" cy="380" r="3.5"/>
  <circle class="dot" cx="594" cy="380" r="3.5"/>
  <circle class="dot" cx="670" cy="380" r="3.5"/>
  <circle class="dot" cx="250" cy="380" r="3.5"/>

  <!-- G1_TX: Grove pin 4 (Cardputer TX) -> RYLR998 RX (pin 3, y=240) -->
  <path class="wire" d="M 220 250 L 590 250 L 590 240 L 690 240"/>
  <text class="net" x="350" y="244" fill="#1976D2">G1_TX</text>

  <!-- G2_RX: Grove pin 3 (Cardputer RX) <- RYLR998 TX (pin 2, y=180) -->
  <path class="wire" d="M 220 210 L 250 210 L 250 168 L 580 168 L 580 180 L 690 180"/>
  <text class="net" x="350" y="162" fill="#FF9800">G2_RX</text>

  <!-- ============ NOTES ============ -->
  <g transform="translate(60 470)">
    <rect width="760" height="74" rx="6" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="3 2"/>
    <text class="note" x="14" y="20" font-size="11" fill="#333" font-style="normal" font-weight="600">Notes</text>
    <text class="note" x="14" y="36">• Cardputer Grove pin 4 (G1) is GPIO 1 (Cardputer TX) → drives RYLR998 RXD.</text>
    <text class="note" x="14" y="50">• Cardputer Grove pin 3 (G2) is GPIO 2 (Cardputer RX) ← reads RYLR998 TXD.</text>
    <text class="note" x="14" y="64">• C1 is the AMS1117 input bulk cap; C2 is the output stability cap. Datasheet calls for ≥10µF on each rail.</text>
  </g>

</svg>
