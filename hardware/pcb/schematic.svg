<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Cardputer LoRa Carrier — schematic</title>

  <defs>
    <style>
      .wire    { stroke: #1B5E20; stroke-width: 2.2; fill: none; }
      .wire-pwr{ stroke: #C62828; stroke-width: 2.6; fill: none; }
      .wire-gnd{ stroke: #424242; stroke-width: 2.6; fill: none; }
      .pad     { fill: #FFD54F; stroke: #8A6B00; stroke-width: 1.2; }
      .body    { fill: #FFFFFF; stroke: #263238; stroke-width: 1.8; }
      .module  { fill: #ECEFF1; stroke: #263238; stroke-width: 1.8; }
      .lbl     { font-size: 13px; fill: #263238; font-weight: 600; }
      .pin     { font-size: 12px; fill: #263238; font-family: monospace; }
      .net     { font-size: 11px; fill: #1B5E20; font-family: monospace; font-weight: 700; }
      .title   { font-size: 18px; fill: #1B5E20; font-weight: 700; }
      .note    { font-size: 11px; fill: #546E7A; font-style: italic; }
      .junction{ fill: #1B5E20; }
    </style>
  </defs>

  <!-- background -->
  <rect width="880" height="460" fill="#FAFAFA"/>

  <text x="440" y="32" text-anchor="middle" class="title">Cardputer LoRa Carrier — schematic (v2, all through-hole)</text>
  <text x="440" y="50" text-anchor="middle" class="note">U1 is the Robu Part 31179 AMS1117-3.3 breakout module (caps built in). No SMD parts.</text>

  <!-- ============== J1: Cardputer Grove socket ============== -->
  <g transform="translate(40, 130)">
    <rect class="body" x="0" y="0" width="120" height="180" rx="6"/>
    <text x="60" y="22" text-anchor="middle" class="lbl">J1</text>
    <text x="60" y="38" text-anchor="middle" class="note">Grove HY2.0</text>
    <text x="60" y="52" text-anchor="middle" class="note">(to Cardputer)</text>

    <!-- 4 pins on right edge -->
    <line class="wire" x1="120" y1="80"  x2="140" y2="80"/>
    <line class="wire" x1="120" y1="105" x2="140" y2="105"/>
    <line class="wire" x1="120" y1="130" x2="140" y2="130"/>
    <line class="wire" x1="120" y1="155" x2="140" y2="155"/>
    <circle class="pad" cx="120" cy="80"  r="4"/>
    <circle class="pad" cx="120" cy="105" r="4"/>
    <circle class="pad" cx="120" cy="130" r="4"/>
    <circle class="pad" cx="120" cy="155" r="4"/>
    <text x="116" y="84"  text-anchor="end" class="pin">1 · 5V</text>
    <text x="116" y="109" text-anchor="end" class="pin">2 · GND</text>
    <text x="116" y="134" text-anchor="end" class="pin">3 · G2 / RX</text>
    <text x="116" y="159" text-anchor="end" class="pin">4 · G1 / TX</text>
  </g>

  <!-- ============== U1: AMS1117-3.3 breakout MODULE (Robu 31179) ============== -->
  <g transform="translate(360, 90)">
    <!-- outer dashed = the 31179 module's own little PCB -->
    <rect x="-10" y="-10" width="160" height="260" rx="8"
          fill="#F1F8E9" stroke="#558B2F" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="70" y="6" text-anchor="middle" class="note">Robu Part 31179 — has its own PCB + caps</text>

    <!-- inner = AMS1117 regulator on the module -->
    <rect class="module" x="20" y="40" width="100" height="80" rx="4"/>
    <text x="70" y="68" text-anchor="middle" class="lbl">AMS1117-3.3</text>
    <text x="70" y="86" text-anchor="middle" class="pin">U1</text>
    <text x="70" y="104" text-anchor="middle" class="note">(SOT-223 on module)</text>

    <!-- onboard caps shown stylized for clarity -->
    <!-- C_in (on module, between VIN and GND) -->
    <line class="wire" x1="35"  y1="40" x2="35"  y2="20"/>
    <line class="wire" x1="35"  y1="140" x2="35" y2="120"/>
    <line stroke="#263238" stroke-width="2.2" x1="25" y1="20" x2="45" y2="20"/>
    <line stroke="#263238" stroke-width="2.2" x1="20" y1="24" x2="50" y2="24"/>
    <text x="56" y="24" class="pin">10µF</text>
    <text x="56" y="36" class="note">(on module)</text>

    <!-- C_out -->
    <line class="wire" x1="105" y1="40"  x2="105" y2="20"/>
    <line class="wire" x1="105" y1="140" x2="105" y2="120"/>
    <line stroke="#263238" stroke-width="2.2" x1="95"  y1="20" x2="115" y2="20"/>
    <line stroke="#263238" stroke-width="2.2" x1="90"  y1="24" x2="120" y2="24"/>
    <text x="86"  y="24" text-anchor="end" class="pin">10µF</text>
    <text x="86"  y="36" text-anchor="end" class="note">(on module)</text>

    <!-- 3 male header pins at bottom (this is what plugs into our carrier) -->
    <!-- Pin row -->
    <line stroke="#263238" stroke-width="1.4" x1="20" y1="140" x2="120" y2="140"/>
    <text x="-12" y="144" text-anchor="end" class="note">module pin row →</text>
    <line class="wire-pwr" x1="35"  y1="140" x2="35"  y2="170"/>
    <line class="wire-gnd" x1="70"  y1="140" x2="70"  y2="170"/>
    <line class="wire-pwr" x1="105" y1="140" x2="105" y2="170"/>
    <circle class="pad" cx="35"  cy="170" r="5"/>
    <circle class="pad" cx="70"  cy="170" r="5"/>
    <circle class="pad" cx="105" cy="170" r="5"/>
    <text x="35"  y="190" text-anchor="middle" class="pin">VIN</text>
    <text x="70"  y="190" text-anchor="middle" class="pin">GND</text>
    <text x="105" y="190" text-anchor="middle" class="pin">VOUT</text>
    <text x="35"  y="208" text-anchor="middle" class="note">5 V in</text>
    <text x="70"  y="208" text-anchor="middle" class="note">0 V</text>
    <text x="105" y="208" text-anchor="middle" class="note">3.3 V out</text>
    <text x="70" y="234" text-anchor="middle" class="note">↑ these 3 pins push through the carrier's THT holes ↑</text>
  </g>

  <!-- ============== J2: RYLR998 socket ============== -->
  <g transform="translate(700, 110)">
    <rect class="body" x="0" y="0" width="140" height="220" rx="6"/>
    <text x="70" y="22" text-anchor="middle" class="lbl">J2 → RYLR998</text>
    <text x="70" y="38" text-anchor="middle" class="note">(1×5 female header)</text>

    <!-- 5 pins on left edge, ORDER FROM USER: GND, TX, RX, RST, VDD (bottom-up on board) -->
    <!-- Drawn top-down here as: VDD, RST, RX, TX, GND -->
    <line class="wire" x1="0" y1="70"  x2="-20" y2="70"/>
    <line class="wire" x1="0" y1="100" x2="-20" y2="100"/>
    <line class="wire" x1="0" y1="130" x2="-20" y2="130"/>
    <line class="wire" x1="0" y1="160" x2="-20" y2="160"/>
    <line class="wire" x1="0" y1="190" x2="-20" y2="190"/>
    <circle class="pad" cx="0" cy="70"  r="4"/>
    <circle class="pad" cx="0" cy="100" r="4"/>
    <circle class="pad" cx="0" cy="130" r="4"/>
    <circle class="pad" cx="0" cy="160" r="4"/>
    <circle class="pad" cx="0" cy="190" r="4"/>
    <text x="6" y="74"  class="pin">5 · VDD</text>
    <text x="6" y="104" class="pin">4 · RST</text>
    <text x="6" y="134" class="pin">3 · RX  ← Cardputer TX</text>
    <text x="6" y="164" class="pin">2 · TX  → Cardputer RX</text>
    <text x="6" y="194" class="pin">1 · GND</text>
  </g>

  <!-- ============== WIRING ============== -->

  <!-- 5V: J1 pin 1 (5V) → U1 VIN -->
  <path class="wire-pwr" d="M 180,210 L 240,210 L 240,150 L 395,150 L 395,260"/>
  <text x="280" y="142" class="net">+5V</text>

  <!-- GND: J1 pin 2 → U1 GND → J2 GND  (one big GND net) -->
  <path class="wire-gnd" d="M 180,235 L 280,235 L 280,360 L 430,360 L 430,260"/>
  <path class="wire-gnd" d="M 430,360 L 680,360 L 680,300"/>
  <circle class="junction" cx="280" cy="360" r="3"/>
  <circle class="junction" cx="430" cy="360" r="3"/>
  <circle class="junction" cx="680" cy="360" r="3"/>
  <text x="475" y="354" class="net">GND</text>

  <!-- 3.3V: U1 VOUT → J2 VDD -->
  <path class="wire-pwr" d="M 465,260 L 465,80 L 690,80 L 690,180"/>
  <text x="560" y="72" class="net">+3.3V</text>

  <!-- G1 / Cardputer TX → RYLR RX -->
  <path class="wire" d="M 180,285 L 600,285 L 600,240 L 680,240"/>
  <text x="380" y="278" class="net">G1 (Cardputer TX)</text>

  <!-- G2 / Cardputer RX ← RYLR TX -->
  <path class="wire" d="M 180,260 L 580,260 L 580,270 L 680,270"/>
  <text x="380" y="253" class="net">G2 (Cardputer RX)</text>

  <!-- legend -->
  <g transform="translate(40, 400)">
    <rect x="0" y="0" width="800" height="42" fill="#FFFFFF" stroke="#90A4AE" stroke-width="1" rx="4"/>
    <line class="wire-pwr" x1="20" y1="14" x2="50" y2="14"/>
    <text x="58" y="18" class="pin">power</text>
    <line class="wire-gnd" x1="130" y1="14" x2="160" y2="14"/>
    <text x="168" y="18" class="pin">ground</text>
    <line class="wire" x1="240" y1="14" x2="270" y2="14"/>
    <text x="278" y="18" class="pin">signal</text>
    <circle class="pad" cx="370" cy="14" r="4"/>
    <text x="382" y="18" class="pin">through-hole pad</text>
    <text x="510" y="18" class="pin">Dashed green box = the 31179 module (bring-your-own; plugs into 3 THT holes)</text>
    <text x="20" y="35" class="note">Carrier holds: 4 holes for J1 (Grove), 3 holes for U1 (31179 module), 5 holes for J2 (RYLR998 socket), 1 mounting hole. That's it.</text>
  </g>
</svg>
